<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <title>08 · CTA — 시작해보세요</title>
    <link rel="stylesheet" href="post.css" />
    <style>
      .slide {
        background: #c4461f;
        color: #faf7f2;
        padding: 96px 72px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        position: relative;
        overflow: hidden;
      }
      .slide::before {
        content: "";
        position: absolute;
        inset: 0;
        background-image:
          radial-gradient(
            circle at 20% 18%,
            rgba(244, 228, 193, 0.18),
            transparent 40%
          ),
          radial-gradient(
            circle at 80% 85%,
            rgba(14, 13, 10, 0.28),
            transparent 45%
          );
        pointer-events: none;
      }
      /* Subtle paper grain to warm it up */
      .slide::after {
        content: "";
        position: absolute;
        inset: 0;
        background-image: radial-gradient(
          rgba(250, 247, 242, 0.06) 1px,
          transparent 1px
        );
        background-size: 4px 4px;
        pointer-events: none;
      }

      .top {
        display: flex;
        justify-content: space-between;
        font-family: var(--font-mono);
        font-size: 20px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: rgba(250, 247, 242, 0.7);
        position: relative;
      }
      .top .tag {
        color: #f4e4c1;
      }

      .middle {
        position: relative;
      }
      .kicker {
        font-family: var(--font-mono);
        font-size: 20px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: #f4e4c1;
        margin-bottom: 28px;
        display: flex;
        align-items: center;
        gap: 14px;
      }
      .kicker .line {
        width: 40px;
        height: 1px;
        background: #f4e4c1;
      }

      h1 {
        font-family: var(--font-sans);
        font-weight: 800;
        font-size: 104px;
        line-height: 1;
        letter-spacing: -0.045em;
        margin: 0;
        color: #faf7f2;
      }
      h1 em {
        font-family: "Space Grotesk", sans-serif;
        font-weight: 700;
        font-style: normal;
      }

      .lede {
        margin-top: 44px;
        font-family: var(--font-sans);
        font-weight: 500;
        font-size: 30px;
        line-height: 1.4;
        letter-spacing: -0.01em;
        color: #faf7f2;
        max-width: 780px;
      }
      .lede code {
        font-family: "JetBrains Mono", monospace;
        font-weight: 600;
        background: rgba(14, 13, 10, 0.25);
        padding: 2px 10px;
        border-radius: 6px;
        font-size: 26px;
        letter-spacing: 0;
      }
      .lede .dim {
        color: rgba(250, 247, 242, 0.7);
      }

      .cta-row {
        margin-top: 56px;
        display: flex;
        flex-direction: column;
        gap: 20px;
        position: relative;
      }
      .cta-item {
        display: flex;
        align-items: center;
        gap: 20px;
        font-family: var(--font-sans);
        font-size: 26px;
        font-weight: 500;
        line-height: 1.35;
        color: #faf7f2;
      }
      .cta-item b {
        font-weight: 700;
      }
      .cta-item .icn {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        background: #faf7f2;
        color: #c4461f;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .cta-item .icn svg {
        width: 24px;
        height: 24px;
        stroke: currentColor;
        stroke-width: 1.75;
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .foot {
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        position: relative;
      }
      .handle {
        font-family: var(--font-mono);
        font-size: 26px;
        color: #faf7f2;
        letter-spacing: -0.01em;
      }
      .handle .dim {
        color: rgba(250, 247, 242, 0.55);
      }
      .handle .sub {
        display: block;
        font-family: var(--font-mono);
        font-size: 14px;
        color: rgba(250, 247, 242, 0.55);
        letter-spacing: 0.12em;
        text-transform: uppercase;
        font-weight: 500;
        margin-top: 6px;
      }
      .page-mark {
        font-family: var(--font-mono);
        font-size: 14px;
        color: rgba(250, 247, 242, 0.6);
        letter-spacing: 0.12em;
        text-align: right;
      }
      .page-mark b {
        display: block;
        font-size: 16px;
        color: #f4e4c1;
        font-weight: 500;
        letter-spacing: 0.08em;
        margin-top: 6px;
      }
    </style>
  </head>
  <body>
    <div class="slide" data-screen-label="08 CTA">
      <div class="top">
        <span>CTA <span class="tag">·</span> END</span>
        <span># 08 / 08</span>
      </div>

      <div class="middle">
        <div class="kicker"><span class="line"></span>여기까지 봐주셨다면</div>
        <h1>저장해두고<br /><em>써보세요.</em></h1>
        <div class="lede">
          자기 인스타에도 디자인 시스템,<br />
          <code>Claude</code>로 시작할 수 있어요.<br />
          <span class="dim">시작점이 궁금하면 DM 주세요.</span>
        </div>

        <div class="cta-row">
          <div class="cta-item">
            <div class="icn">
              <svg viewBox="0 0 24 24">
                <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z" />
              </svg>
            </div>
            <span><b>저장</b>해두고 다음 새벽에 열어보세요</span>
          </div>
          <div class="cta-item">
            <div class="icn">
              <svg viewBox="0 0 24 24">
                <path
                  d="M12 20.5c-5.5-4-8-7-8-11a4 4 0 0 1 8-1 4 4 0 0 1 8 1c0 4-2.5 7-8 11z"
                />
              </svg>
            </div>
            <span><b>팔로우</b>해두면 다음 포스트도 같은 시스템에서</span>
          </div>
        </div>
      </div>

      <div class="foot">
        <div class="handle">
          <span class="dim">@</span>codemom<span class="dim">.life</span>
          <span class="sub">개발자맘의 AI 라이프</span>
        </div>
        <div class="page-mark">
          END OF CAROUSEL
          <b>FOLLOW →</b>
        </div>
      </div>
    </div>
  </body>
</html>
