<!doctype html>
<html lang="ko"><head>
<meta charset="utf-8"/>
<title>01 Cover — 캡컷 열고 3분 만에 닫은 사람?</title>
<link rel="stylesheet" href="post.css"/>
<style>
  .slide { background: var(--pg-bg); color: var(--pg-ink); }
  .slide::before {
    content: ""; position: absolute; inset: 0;
    background-image:
      radial-gradient(rgba(196,70,31,0.04) 1px, transparent 1.5px);
    background-size: 32px 32px;
    pointer-events: none;
  }
  .body { position:absolute; left:72px; right:72px; top:180px; bottom:200px; display:flex; flex-direction:column; gap:56px; }
  .kicker {
    font-family: var(--font-mono);
    font-size: 22px; letter-spacing: 0.1em;
    color: var(--pg-ink-subtle);
    display: inline-flex; align-items: center; gap: 14px;
  }
  .kicker .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--pg-accent); }
  h1 {
    font-family: var(--font-sans);
    font-weight: 800; font-size: 120px; line-height: 1.0;
    letter-spacing: -0.045em; margin: 0; color: var(--pg-ink);
    text-wrap: pretty;
  }
  h1 .mark {
    background: var(--pg-highlight);
    padding: 0 12px; box-decoration-break: clone;
  }

  /* Reply as a clear chat bubble — reads as "someone replying" */
  .reply-wrap {
    margin-top: auto;
    display: flex; flex-direction: column; gap: 14px;
    align-items: flex-start;
  }
  .reply-connector {
    margin-left: 40px;
    display: flex; flex-direction: column; align-items: flex-start; gap: 4px;
  }
  .reply-connector svg { display: block; }

  .bubble {
    background: var(--pg-accent);
    color: #FAF7F2;
    border-radius: 24px 24px 24px 6px;
    padding: 22px 32px;
    display: inline-flex; align-items: baseline; gap: 14px;
    box-shadow: 0 12px 32px rgba(196,70,31,0.22);
    position: relative;
    font-family: var(--font-sans);
  }
  .bubble .me {
    font-weight: 700; font-size: 54px; letter-spacing: -0.03em;
  }
  .bubble .period {
    font-weight: 700; font-size: 54px;
    color: #F4E4C1;
    margin-left: 2px;
  }
  .bubble-meta {
    font-family: var(--font-mono);
    font-size: 16px; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--pg-ink-subtle);
    margin-left: 12px;
    display: inline-flex; align-items: center; gap: 10px;
  }
  .bubble-meta .dot { width:6px; height:6px; border-radius:50%; background: var(--pg-ink-subtle); opacity:0.5; }
</style></head>
<body>
<div class="slide" data-screen-label="01 Cover">
  <div class="series">
    <span class="bracket">&lt;codemom&gt;</span>
    <span class="name">코드맘이만든앱</span>
  </div>
  <div class="page-num">01 / <b>08</b></div>

  <div class="body">
    <div class="kicker"><span class="dot"></span>EP.01 · 캡컷 편집 현실</div>
    <h1>
      캡컷 열고<br/>
      <span class="mark">3분 만에</span><br/>
      닫은 사람?
    </h1>

    <div class="reply-wrap">
      <div class="bubble-meta">Reply <span class="dot"></span> 방금</div>
      <!-- L-shaped connector line from question down into the bubble -->
      <svg width="80" height="48" viewBox="0 0 80 48" fill="none" aria-hidden="true">
        <path d="M16 0 V30 Q16 40 26 40 H72" stroke="#C4461F" stroke-width="3" stroke-linecap="round" fill="none"/>
        <path d="M64 32 L74 40 L64 48" stroke="#C4461F" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </svg>
      <div class="bubble">
        <span class="me">… 저요<span class="period">.</span></span>
      </div>
    </div>
  </div>

  <div class="footer">
    <span>@codemom.life</span>
    <span>SWIPE →</span>
  </div>
</div>
</body></html>
