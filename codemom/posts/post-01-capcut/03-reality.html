<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <title>03 Reality — 한 손에는 아기, 한 손으로는 불가능</title>
    <link rel="stylesheet" href="post.css" />
    <style>
      .slide {
        background: var(--pg-surface-2);
        color: var(--pg-ink);
      }
      .body {
        position: absolute;
        left: 72px;
        right: 72px;
        top: 180px;
        bottom: 140px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }

      .stack-q {
        display: flex;
        flex-direction: row;
        gap: 16px;
        flex-wrap: wrap;
      }
      .q {
        font-family: var(--font-sans);
        font-weight: 800;
        font-size: 62px;
        line-height: 1;
        letter-spacing: -0.04em;
        color: var(--pg-ink);
      }
      .q:nth-child(1) {
        opacity: 1;
      }
      .q:nth-child(2) {
        opacity: 0.72;
      }
      .q:nth-child(3) {
        opacity: 0.45;
      }
      .q .mark {
        color: var(--pg-accent);
      }

      /* Timeline screenshot block */
      .timeline-shot {
        margin-top: 4px;
        border-radius: 14px;
        overflow: hidden;
        box-shadow: 0 12px 36px rgba(14, 13, 10, 0.18);
        border: 1px solid var(--pg-line);
        background: var(--pg-bg);
      }
      .timeline-shot img {
        display: block;
        width: 100%;
        height: auto;
      }
      .timeline-caption {
        margin-top: 12px;
        font-family: var(--font-mono);
        font-size: 16px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--pg-ink-subtle);
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .timeline-caption .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--pg-accent);
      }

      .separator {
        display: flex;
        align-items: center;
        gap: 20px;
        margin: 0;
        font-family: var(--font-mono);
        font-size: 18px;
        letter-spacing: 0.14em;
        color: var(--pg-ink-subtle);
        text-transform: uppercase;
      }
      .separator .line {
        flex: 1;
        height: 1px;
        background: var(--pg-ink-subtle);
        opacity: 0.35;
      }

      .reality {
        font-family: var(--font-sans);
        font-weight: 500;
        font-size: 36px;
        line-height: 1.45;
        color: var(--pg-ink-muted);
        letter-spacing: -0.015em;
      }
      .reality b {
        color: var(--pg-ink);
        font-weight: 700;
      }

      .verdict {
        display: inline-flex;
        align-items: center;
        gap: 18px;
        padding: 18px 28px;
        background: var(--pg-ink);
        color: var(--pg-bg);
        border-radius: 12px;
        font-family: var(--font-sans);
        font-weight: 700;
        font-size: 34px;
        letter-spacing: -0.02em;
        align-self: flex-start;
      }
      .verdict .time {
        font-family: "Space Grotesk", sans-serif;
        color: var(--pg-amber);
        font-size: 40px;
        letter-spacing: -0.02em;
      }
    </style>
  </head>
  <body>
    <div class="slide" data-screen-label="03 Reality">
      <div class="series">
        <span class="bracket">&lt;codemom&gt;</span>
        <span class="name">코드맘이만든앱</span>
      </div>
      <div class="page-num">03 / <b>08</b></div>

      <div class="body">
        <div class="stack-q">
          <div class="q">타임라인<span class="mark">?</span></div>
          <div class="q">트랜지션<span class="mark">?</span></div>
          <div class="q">자막 싱크<span class="mark">?</span></div>
        </div>

        <div>
          <div class="timeline-shot">
            <img
              src="assets/capcut-timeline.jpeg"
              alt="CapCut 편집 타임라인 — 클립 5개 위에 시간과 캡션 라벨이 붙어 있다"
            />
          </div>
          <div class="timeline-caption">
            <span class="dot"></span>
            <span>CapCut · 편집 중 캡처</span>
          </div>
        </div>

        <div class="separator">
          <span>그리고 현실</span>
          <span class="line"></span>
        </div>

        <div class="reality">
          한 손에는 <b>아기</b>,<br />
          한 손으로는 <b>불가능</b>.
        </div>

        <div class="verdict">
          결과 &nbsp;·&nbsp; <span class="time">3분</span> 만에 닫았다.
        </div>
      </div>

      <div class="footer">
        <span>@codemom.life</span>
        <span>SWIPE →</span>
      </div>
    </div>
  </body>
</html>
