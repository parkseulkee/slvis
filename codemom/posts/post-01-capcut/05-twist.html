  .body { position:absolute; left:72px; right:72px; top:200px; bottom:140px; display:flex; flex-direction:column; justify-content: center; gap: 72px; }

  .hero .prelude {

  }
  .hero .line-main {

  .hero .line-main .num {

  .hero .line-main .years {

    color: var(--pg-accent);

  .manifesto {

    grid-template-columns: auto 1fr;
    gap: 28px;

  .manifesto .qmark {

    line-height: 0.6;
    color: var(--pg-amber);
    align-self: flex-start;
    padding-top: 18px;

  .manifesto .text {
    font-family: var(--font-sans);
    font-weight: 700;
    font-size: 46px;
    line-height: 1.2;
    letter-spacing: -0.025em;
  }
  .manifesto .text .hl { color: var(--pg-amber); }
  .manifesto .attrib {
    grid-column: 2;
    margin-top: 14px;
    font-family: var(--font-mono);
    font-size: 16px; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--pg-ink-subtle);
