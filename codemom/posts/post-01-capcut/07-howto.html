<style>
  .slide { background: var(--pg-bg); color: var(--pg-ink); }

  .section-title {

    color: var(--pg-ink-subtle);
    display: flex; align-items: center; gap: 16px;
  }

  h2 .thin { font-family: 'Space Grotesk', sans-serif; font-weight: 500; color: var(--pg-ink-muted); }

  .steps { display: flex; flex-direction: column; gap: 18px; }
  .step {
    background: var(--pg-surface);

    grid-template-columns: 72px 76px 1fr;
    gap: 24px;
    align-items: center;

  .step .n {

    color: var(--pg-accent);
    letter-spacing: -0.04em;

  .step .ico {
    width: 76px; height: 76px;

  .step .ico svg { width: 44px; height: 44px; }
  .step .head {

    font-weight: 700; font-size: 34px;
    line-height: 1.25; letter-spacing: -0.02em;

  .step .desc {

    font-weight: 400; font-size: 22px;
    line-height: 1.4; color: var(--pg-ink-muted);
    margin: 0;
  }

  .coda {
    margin-top: auto;
    padding: 22px 28px;
    border: 2px dashed var(--pg-line);
    border-radius: 14px;
    font-family: var(--font-sans);
    font-weight: 500; font-size: 26px;
    color: var(--pg-ink-muted);
    letter-spacing: -0.01em;
    text-align: center;
  }
  .coda b { color: var(--pg-ink); font-weight: 700; }
