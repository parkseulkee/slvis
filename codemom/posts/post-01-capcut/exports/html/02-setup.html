<!doctype html>
<html lang="ko"><head>
<meta charset="utf-8"/>
<title>02 Setup — 아기 재우고 드디어 23분</title>
<link rel="stylesheet" href="../../post.css"/>
<style>
  .slide { background: var(--pg-bg); color: var(--pg-ink); }
  .body { position:absolute; left:72px; right:72px; top:180px; bottom:140px; display:flex; flex-direction:column; justify-content: center; gap: 56px; }

  .timestamp {
    display: inline-flex; align-items: baseline; gap: 20px;
    font-family: var(--font-mono);
    color: var(--pg-ink-subtle);
  }
  .timestamp .t { font-size: 26px; letter-spacing: 0.08em; }
  .timestamp .value {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 88px;
    color: var(--pg-ink);
    letter-spacing: -0.03em;
  }
  .timestamp .value .unit { color: var(--pg-accent); }

  .narration {
    font-family: var(--font-sans);
    font-weight: 600;
    font-size: 48px;
    line-height: 1.35;
    color: var(--pg-ink);
    letter-spacing: -0.02em;
    max-width: 820px;
  }
  .narration .muted { color: var(--pg-ink-muted); font-weight: 500; }

  .quote-block {
    background: var(--pg-surface);
    border-left: 4px solid var(--pg-accent);
    padding: 32px 40px;
    border-radius: 0 16px 16px 0;
    max-width: 860px;
  }
  .quote-block .thought {
    font-family: var(--font-sans);
    font-weight: 500; font-size: 38px; line-height: 1.4;
    color: var(--pg-ink);
    margin: 0;
    letter-spacing: -0.02em;
  }
  .quote-block .who {
    font-family: var(--font-mono);
    font-size: 18px; letter-spacing: 0.1em;
    color: var(--pg-ink-subtle);
    margin-top: 14px;
  }

  .action {
    display: inline-flex; align-items: center; gap: 24px;
    font-family: var(--font-sans);
    font-size: 38px; font-weight: 600;
    color: var(--pg-ink);
    letter-spacing: -0.02em;
    margin-top: 8px;
  }
  .app-icon {
    width: 92px; height: 92px;
    border-radius: 22px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 10px 28px rgba(14,13,10,0.18);
    position: relative;
    flex-shrink: 0;
    overflow: hidden;
    background: #fff;
    border: 1px solid var(--pg-line);
  }
  .app-icon img { width: 100%; height: 100%; object-fit: contain; display: block; }
  .app-icon .name {
    position: absolute;
    left: 50%; bottom: -28px;
    transform: translateX(-50%);
    font-family: var(--font-mono);
    font-size: 14px; letter-spacing: 0.1em;
    color: var(--pg-ink-subtle);
    white-space: nowrap;
    text-transform: uppercase;
  }
  .action .verb { color: var(--pg-ink-muted); font-weight: 500; }
  .action .verb b { color: var(--pg-ink); font-weight: 700; }

  /* EXPORT OVERRIDE */
  html, body { width:1080px !important; height:1350px !important; background:#FAF7F2 !important; display:block !important; overflow:hidden !important; }
  .slide { position:absolute !important; top:0 !important; left:0 !important; width:1080px !important; height:1350px !important; }
  
</style></head>
<body>
<div class="slide" data-screen-label="02 Setup">
  <div class="series">
    <span class="bracket">&lt;codemom&gt;</span>
    <span class="name">코드맘이만든앱</span>
  </div>
  <div class="page-num">02 / <b>08</b></div>

  <div class="body">
    <div class="narration">
      아기 재우고<br/>
      드디어 <span class="muted">나만의 시간</span>
    </div>

    <div class="timestamp">
      <span class="t">TIME LEFT</span>
      <span class="value">23<span class="unit">분</span></span>
    </div>

    <div class="quote-block">
      <p class="thought">"오늘 찍은 영상<br/>브이로그로 만들어볼까?"</p>
      <div class="who">— 나의 착각, 2026.04.15 23:40</div>
    </div>

    <div class="action">
      <div class="app-icon">
        <img src="../../assets/capcut-logo.png" alt="CapCut"/>
        <span class="name">CapCut</span>
      </div>
      <span class="verb">잠깐만요, <b>열어볼게요.</b></span>
    </div>
  </div>

  <div class="footer">
    <span>@codemom.life</span>
    <span>SWIPE →</span>
  </div>
</div>
</body></html>
