<!doctype html>
<html lang="ko"><head>
<meta charset="utf-8"/>
<title>03 Reality — 한 손에는 아기, 한 손으로는 불가능</title>
<link rel="stylesheet" href="../../post.css"/>
<style>
  .slide { background: var(--pg-surface-2); color: var(--pg-ink); }
  .body { position:absolute; left:72px; right:72px; top:180px; bottom:140px; display:flex; flex-direction:column; justify-content: space-between; }

  .stack-q {
    display: flex; flex-direction: column; gap: 8px;
  }
  .q {
    font-family: var(--font-sans);
    font-weight: 800;
    font-size: 96px;
    line-height: 1.02;
    letter-spacing: -0.045em;
    color: var(--pg-ink);
    position: relative;
    padding-left: 0;
  }
  .q:nth-child(1) { opacity: 1; }
  .q:nth-child(2) { opacity: 0.72; }
  .q:nth-child(3) { opacity: 0.45; }
  .q .mark { color: var(--pg-accent); }

  .separator {
    display: flex; align-items: center; gap: 20px;
    margin: 0;
    font-family: var(--font-mono);
    font-size: 18px; letter-spacing: 0.14em;
    color: var(--pg-ink-subtle);
    text-transform: uppercase;
  }
  .separator .line { flex: 1; height: 1px; background: var(--pg-ink-subtle); opacity: 0.35; }

  .reality {
    font-family: var(--font-sans);
    font-weight: 500;
    font-size: 36px;
    line-height: 1.45;
    color: var(--pg-ink-muted);
    letter-spacing: -0.015em;
  }
  .reality b { color: var(--pg-ink); font-weight: 700; }

  .verdict {
    display: inline-flex; align-items: center; gap: 18px;
    padding: 18px 28px;
    background: var(--pg-ink);
    color: var(--pg-bg);
    border-radius: 12px;
    font-family: var(--font-sans);
    font-weight: 700;
    font-size: 34px;
    letter-spacing: -0.02em;
    align-self: flex-start;
  }
  .verdict .time {
    font-family: 'Space Grotesk', sans-serif;
    color: var(--pg-amber);
    font-size: 40px;
    letter-spacing: -0.02em;
  }

  /* EXPORT OVERRIDE */
  html, body { width:1080px !important; height:1350px !important; background:#FAF7F2 !important; display:block !important; overflow:hidden !important; }
  .slide { position:absolute !important; top:0 !important; left:0 !important; width:1080px !important; height:1350px !important; }
  
</style></head>
<body>
<div class="slide" data-screen-label="03 Reality">
  <div class="series">
    <span class="bracket">&lt;codemom&gt;</span>
    <span class="name">코드맘이만든앱</span>
  </div>
  <div class="page-num">03 / <b>08</b></div>

  <div class="body">
    <div class="stack-q">
      <div class="q">타임라인<span class="mark">?</span></div>

    </div>

    <div class="separator">
      <span>그리고 현실</span>
      <span class="line"></span>
    </div>

    <div class="reality">
      한 손에는 <b>아기</b>,<br/>
      한 손으로는 <b>불가능</b>.
    </div>

    <div class="verdict">
      결과 &nbsp;·&nbsp; <span class="time">3분</span> 만에 닫았다.
    </div>
  </div>

  <div class="footer">
    <span>@codemom.life</span>
    <span>SWIPE →</span>
  </div>
