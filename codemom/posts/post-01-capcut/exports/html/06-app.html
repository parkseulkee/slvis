<!doctype html>
<html lang="ko"><head>
<meta charset="utf-8"/>
<title>06 App — JANJAN</title>
<link rel="stylesheet" href="../../post.css"/>
<style>
  .slide { background: var(--pg-dark); color: var(--pg-bg); }
  .slide::before {
    content: ""; position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(232,185,96,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(232,185,96,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
  }
  .body { position:absolute; left:72px; right:72px; top:180px; bottom:140px; display:flex; flex-direction:column; justify-content: space-between; }

  .intro {
    font-family: var(--font-sans);
    font-weight: 500; font-size: 28px;
    color: #A89C82;
    letter-spacing: -0.01em;
  }

  /* Logo: wordmark + mission-driven tagline */
  .logo-block { display: flex; flex-direction: column; gap: 14px; }
  .logo-row { display: flex; align-items: center; gap: 20px; }
  .logo-mark {
    width: 76px; height: 76px;
    background: var(--pg-amber);
    border-radius: 18px;
    display: flex; align-items: center; justify-content: center;
  }
  .logo-mark svg { width: 48px; height: 48px; }
  .logo-word {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700; font-size: 60px;
    color: var(--pg-bg);
    letter-spacing: -0.035em;
  }
  .tagline {
    font-family: var(--font-mono);
    font-size: 18px; letter-spacing: 0.2em; text-transform: uppercase;
    color: #A89C82;
  }
  .tagline .em { color: var(--pg-amber); }

  /* The concept — the meaning of 잔잔 */
  .concept {
    font-family: var(--font-sans);
    font-weight: 800;
    font-size: 68px;
    line-height: 1.12;
    letter-spacing: -0.035em;
    color: var(--pg-bg);
    margin: 0;
    text-wrap: pretty;
  }
  .concept .fade { color: #6B6150; text-decoration: line-through; text-decoration-thickness: 2px; text-decoration-color: #6B6150; }
  .concept .hl { color: var(--pg-amber); }

  .explain {
    font-family: var(--font-sans);
    font-weight: 500;
    font-size: 24px;
    line-height: 1.5;
    color: #A89C82;
    letter-spacing: -0.01em;
    max-width: 820px;
    padding-left: 20px;
    border-left: 2px solid var(--pg-amber);
  }
  .explain b { color: var(--pg-bg); font-weight: 700; }

  .compare {
    display: grid; grid-template-columns: 1fr auto 1fr; gap: 24px;
    align-items: center;
    padding: 24px 28px;
    background: var(--pg-dark-surface);
    border: 1px solid #22201A;
    border-radius: 16px;
  }
  .compare .side { display: flex; flex-direction: column; gap: 4px; }
  .compare .label {
    font-family: var(--font-mono);
    font-size: 16px; letter-spacing: 0.14em;
    color: #6B6150; text-transform: uppercase;
  }
  .compare .time {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700; font-size: 48px;
    letter-spacing: -0.03em;
  }
  .compare .side.before .time { color: #A89C82; text-decoration: line-through; text-decoration-thickness: 3px; text-decoration-color: #E07856; }
  .compare .side.after .time { color: var(--pg-amber); }
  .compare .arrow {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700; font-size: 28px;
    color: var(--pg-amber);
  }

  /* EXPORT OVERRIDE */
  html, body { width:1080px !important; height:1350px !important; background:#FAF7F2 !important; display:block !important; overflow:hidden !important; }
  .slide { position:absolute !important; top:0 !important; left:0 !important; width:1080px !important; height:1350px !important; }
  
</style></head>
<body>
<div class="slide dark" data-screen-label="06 App">
  <div class="series">
    <span class="bracket">&lt;codemom&gt;</span>

  </div>

  <div class="body">
    <div class="intro">그래서 진짜 만들었어요.</div>

    <div class="logo-block">
      <div class="logo-row">
        <div class="logo-mark">
          <svg viewBox="0 0 48 48" fill="none">
            <path d="M4 20 C10 14, 16 26, 24 20 S 38 14, 44 20" stroke="#0E0D0A" stroke-width="3.5" stroke-linecap="round"/>
            <path d="M4 30 C10 24, 16 36, 24 30 S 38 24, 44 30" stroke="#0E0D0A" stroke-width="3.5" stroke-linecap="round" opacity="0.55"/>
          </svg>
        </div>
        <div class="logo-word">JANJAN</div>
      </div>
      <div class="tagline">A <span class="em">diary</span> for the quiet days</div>
    </div>

    <h2 class="concept">
      <span class="fade">흘려보내던</span> 잔잔한 하루를<br/>
      <span class="hl">기록</span>하게 만드는 앱.
    </h2>

    <div class="explain">
      기념일만 사진 찍지 마세요. 아기가 처음 웃은 목요일,<br/>
      아무 일 없던 화요일 오후 — <b>그게 진짜 하루거든요.</b>
    </div>

    <div class="compare">
      <div class="side before">
        <div class="label">CapCut</div>
        <div class="time">40분</div>
      </div>
      <div class="arrow">→</div>
      <div class="side after">
        <div class="label">JANJAN</div>
        <div class="time">30초</div>
      </div>
    </div>
  </div>

  <div class="footer">
    <span>@codemom.life</span>
    <span>SWIPE →</span>
  </div>
</div>
</body></html>
