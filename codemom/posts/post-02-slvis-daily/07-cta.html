<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <title>Post 02 / 07 — CTA</title>
    <link rel="stylesheet" href="post.css" />
    <style>
      .slide {
        padding: 72px 72px 64px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }
      .kicker {
        font-family: var(--font-mono);
        font-size: 24px;
        letter-spacing: 0.08em;
        color: var(--pg-amber);
        margin-bottom: 28px;
        text-transform: uppercase;
      }
      h1 {
        font-family: var(--font-sans);
        font-weight: 800;
        font-size: 72px;
        line-height: 1.14;
        letter-spacing: -0.035em;
        margin: 0 0 24px;
        color: var(--pg-ink);
      }
      h1 .accent {
        color: var(--pg-amber);
      }
      h1 code {
        font-family: var(--font-mono);
        font-weight: 700;
        font-size: 60px;
        color: var(--pg-amber);
        background: var(--pg-surface-2);
        padding: 2px 14px;
        border-radius: 8px;
        letter-spacing: 0.02em;
      }
      .body {
        font-family: var(--font-sans);
        font-size: 30px;
        line-height: 1.45;
        color: var(--pg-ink-muted);
        margin: 0 0 48px;
        max-width: 760px;
      }
      .body b {
        color: var(--pg-ink);
        font-weight: 600;
      }
      .cta-row {
        display: flex;
        flex-direction: column;
        gap: 20px;
        margin-top: 16px;
      }
      .cta-item {
        display: flex;
        align-items: center;
        gap: 22px;
        font-family: var(--font-sans);
        font-size: 28px;
        font-weight: 500;
        line-height: 1.3;
        color: var(--pg-ink);
      }
      .cta-item .icn {
        width: 54px;
        height: 54px;
        border-radius: 50%;
        background: var(--pg-amber);
        color: var(--pg-bg);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .cta-item .icn svg {
        width: 26px;
        height: 26px;
        stroke: currentColor;
        stroke-width: 2;
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .cta-item b {
        font-weight: 700;
        color: var(--pg-amber);
      }
      .next {
        margin-top: 28px;
        padding: 20px 28px;
        background: var(--pg-surface);
        border: 1px solid var(--pg-line);
        border-radius: 12px;
        font-family: var(--font-mono);
        font-size: 20px;
        color: var(--pg-ink-muted);
        letter-spacing: 0.02em;
      }
      .next .label {
        color: var(--pg-amber);
        letter-spacing: 0.12em;
        text-transform: uppercase;
        font-size: 16px;
        margin-right: 12px;
      }
      .next code {
        font-family: var(--font-mono);
        color: var(--pg-amber);
        font-weight: 700;
      }
      .handle {
        font-family: var(--font-mono);
        font-size: 28px;
        color: var(--pg-ink);
        letter-spacing: -0.01em;
      }
      .handle .dim {
        color: var(--pg-ink-subtle);
      }
    </style>
  </head>
  <body>
    <div class="slide tech" data-screen-label="07 CTA">
      <div class="top">
        <span>— <span class="tag">그리고</span></span>
        <span># 07 / 07</span>
      </div>

      <div style="position: relative">
        <div class="kicker">wrap up</div>
        <h1>
          노트 앱에 자동 저장은<br />
          <span class="accent">덤</span>이에요.
        </h1>
        <p class="body">
          메인은 <b>폰에서 받는 아침 브리핑</b>.<br />
          <code
            style="
              font-family: var(--font-mono);
              color: var(--pg-amber);
              font-size: 26px;
            "
            >Obsidian</code
          >은 기록이 필요할 때만 들여다봐요.
        </p>

        <div class="cta-row">
          <div class="cta-item">
            <div class="icn">
              <svg viewBox="0 0 24 24">
                <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z" />
              </svg>
            </div>
            <span><b>저장</b>해두고 내일 아침에 만들어보세요</span>
          </div>
          <div class="cta-item">
            <div class="icn">
              <svg viewBox="0 0 24 24">
                <path
                  d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"
                />
              </svg>
            </div>
            <span>스킬 상세 궁금하면 댓글 <b>"SLVIS"</b> — DM 보내드려요</span>
          </div>
        </div>

        <div class="next">
          <span class="label">NEXT</span>클로드 코드를
          <b style="color: var(--pg-amber)">폰에서</b>
          실행시키는 법
        </div>
      </div>

      <div class="footer">
        <div class="handle">
          <span class="dim">@</span>codemom<span class="dim">.life</span>
        </div>
        <div class="swipe">FOLLOW →</div>
      </div>
    </div>
  </body>
</html>
