<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <title>Post 02 / 04 — Process</title>
    <link rel="stylesheet" href="post.css" />
    <style>
      .slide {
        padding: 72px 72px 64px;
        display: flex;
        flex-direction: column;
        gap: 40px;
      }
      h2 {
        font-family: var(--font-sans);
        font-weight: 800;
        font-size: 68px;
        line-height: 1.08;
        letter-spacing: -0.035em;
        margin: 0;
        color: var(--pg-ink);
      }
      h2 em {
        font-family: "Space Grotesk", sans-serif;
        font-weight: 700;
        font-style: normal;
        color: var(--pg-amber);
      }
      h2 code {
        font-family: var(--font-mono);
        font-weight: 700;
        color: var(--pg-amber);
        font-size: 60px;
        letter-spacing: 0.02em;
      }
      .steps {
        display: flex;
        flex-direction: column;
        gap: 16px;
        position: relative;
      }
      .step {
        background: var(--pg-surface);
        border: 1px solid var(--pg-line);
        border-radius: 16px;
        padding: 24px 28px;
        display: grid;
        grid-template-columns: 72px 1fr;
        gap: 24px;
        align-items: center;
      }
      .step .n {
        font-family: var(--font-mono);
        font-size: 30px;
        color: var(--pg-amber);
        font-weight: 700;
        letter-spacing: 0.02em;
      }
      .step h3 {
        font-family: var(--font-sans);
        font-weight: 700;
        font-size: 32px;
        margin: 0 0 6px;
        color: var(--pg-ink);
        letter-spacing: -0.02em;
      }
      .step p {
        font-family: var(--font-mono);
        font-size: 18px;
        margin: 0;
        color: var(--pg-ink-muted);
        letter-spacing: 0.02em;
      }
      .summary {
        margin-top: auto;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px 28px;
        background: var(--pg-surface-2);
        border-radius: 12px;
        font-family: var(--font-mono);
        font-size: 20px;
        color: var(--pg-ink);
      }
      .summary .v {
        color: var(--pg-amber);
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <div class="slide tech" data-screen-label="04 Process">
      <div class="top">
        <span
          ><code style="font-family: var(--font-mono); color: var(--pg-amber)"
            >/daily</code
          >
          · <span class="tag">PROCESS</span></span
        >
        <span># 04 / 07</span>
      </div>

      <h2>치면 이런 순서로<br />돌아가요</h2>

      <div class="steps">
        <div class="step">

          <div>

            <p>gcalcli agenda — 개인·가족·공휴일</p>

        </div>
        <div class="step">
          <div class="n">02</div>

            <p>개발자가 볼 만한 3~5개 선별</p>
          </div>
        </div>
        <div class="step">
          <div class="n">03</div>
          <div>
            <h3>경제·정치 뉴스 큐레이션</h3>
            <p>출처 있는 뉴스 3~5개 선별</p>
          </div>
        </div>
        <div class="step">
          <div class="n">04</div>
          <div>

            <p>폰 채널로 바로 도착</p>
          </div>
        </div>
      </div>

      <div class="summary">
        <span>TOTAL</span>
        <span class="v">~ 2분 · 커피 내리는 동안</span>

      <div class="footer">
        <span>@codemom.life</span>
        <span class="swipe">SWIPE →</span>

    </div>

</html>
