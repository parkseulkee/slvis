<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <title>Post 02 — SLVIS /daily · 7장 한눈에</title>
    <link rel="stylesheet" href="../../colors_and_type.css" />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: #0e0d0a;
        color: #f2ece0;
        font-family: var(--font-sans);
      }
      .wrap {
        max-width: 1760px;
        margin: 0 auto;
        padding: 56px 48px;
      }
      header {
        margin-bottom: 40px;
      }
      .eyebrow {
        font-family: var(--font-mono);
        font-size: 14px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: #e8b960;
        margin-bottom: 10px;
      }
      h1 {
        font-family: var(--font-sans);
        font-weight: 800;
        font-size: 48px;
        letter-spacing: -0.035em;
        margin: 0 0 8px;
      }
      .sub {
        font-family: var(--font-mono);
        font-size: 16px;
        color: #a89c82;
        letter-spacing: 0.04em;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 28px;
      }
      .cell {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .slot {
        aspect-ratio: 4/5;
        background: #0e0d0a;
        border-radius: 12px;
        overflow: hidden;
        position: relative;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
      }
      .slot iframe {
        width: 1080px;
        height: 1350px;
        transform-origin: top left;
        border: 0;
        position: absolute;
        top: 0;
        left: 0;
      }
      .label {
        display: flex;
        justify-content: space-between;
        font-family: var(--font-mono);
        font-size: 13px;
        letter-spacing: 0.08em;
        color: #a89c82;
      }
      .label .num {
        color: #e8b960;
      }
      .title {
        font-family: var(--font-sans);
        font-weight: 600;
        font-size: 18px;
        color: #f2ece0;
        letter-spacing: -0.015em;
      }
      .open {
        font-family: var(--font-mono);
        font-size: 12px;
        color: #6b6150;
        text-decoration: none;
        letter-spacing: 0.1em;
      }
      .open:hover {
        color: #e8b960;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header>
        <div class="eyebrow">&lt;codemom&gt; · Post 02 · AI / WORKFLOW</div>
        <h1>아침에 /daily 한 번 치면 끝나는 것 3가지</h1>
        <div class="sub">7 slides · 1080×1350 · @codemom.life</div>
      </header>

      <div class="grid" id="grid"></div>
    </div>

    <script>
      const slides = [
        { n: "01", t: "표지 · 훅", file: "01-cover.html" },
        { n: "02", t: "맥락 · 공감", file: "02-context.html" },
        { n: "03", t: "SLVIS 소개", file: "03-intro.html" },
        { n: "04", t: "/daily 프로세스", file: "04-process.html" },
        { n: "05", t: "브리핑 구성 3가지", file: "05-list.html" },
        { n: "06", t: "실제 화면", file: "06-photo-essay.html" },
        { n: "07", t: "CTA", file: "07-cta.html" },
      ];

      const g = document.getElementById("grid");
      slides.forEach((s) => {
        g.insertAdjacentHTML(
          "beforeend",
          `
    <div class="cell">
      <div class="slot" data-file="${s.file}">
        <iframe src="${s.file}" scrolling="no"></iframe>
      </div>
      <div class="label"><span class="num">${s.n} / 07</span><a class="open" href="${s.file}" target="_blank">OPEN ↗</a></div>
      <div class="title">${s.t}</div>
    </div>
  `,
        );
      });

      function fit() {
        document.querySelectorAll(".slot").forEach((slot) => {
          const w = slot.clientWidth;
          const scale = w / 1080;
          const iframe = slot.querySelector("iframe");
          iframe.style.transform = `scale(${scale})`;
          slot.style.height = 1350 * scale + "px";
        });
      }
      window.addEventListener("load", fit);
      window.addEventListener("resize", fit);
      setTimeout(fit, 100);
    </script>
  </body>
</html>
