<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <title>03 · Before / After — 딸깍 vs 설계 먼저 (HITL)</title>
    <link rel="stylesheet" href="post.css" />
    <style>
      .slide {
        padding: 72px 72px;
      }

      .title-block {
        position: absolute;
        left: 72px;
        right: 72px;
        top: 140px;
        z-index: 5;
      }
      .title-block h2 {
        font-family: var(--font-sans);
        font-weight: 800;
        font-size: 52px;
        line-height: 1.1;
        letter-spacing: -0.03em;
        margin: 0;
        color: var(--pg-dark-fg);
      }
      .title-block .sub {
        margin-top: 14px;
        font-family: var(--font-sans);
        font-weight: 500;
        font-size: 24px;
        color: var(--pg-dark-fg-muted);
      }

      .split {
        position: absolute;
        left: 72px;
        right: 72px;
        top: 320px;
        bottom: 170px;
        z-index: 5;
        display: grid;
        grid-template-columns: 1fr 56px 1fr;
        gap: 0;
      }

      .col {
        display: flex;
        flex-direction: column;
        padding: 36px 28px;
        border-radius: 20px;
        background: var(--pg-dark-surface);
        border: 1px solid var(--pg-line);
      }
      .col.before {
        border-color: rgba(224, 120, 86, 0.25);
      }
      .col.after {
        border-color: rgba(232, 185, 96, 0.3);
      }

      .col .col-label {
        font-family: "JetBrains Mono", monospace;
        font-size: 18px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        margin-bottom: 22px;
      }
      .col.before .col-label {
        color: var(--pg-coral);
      }
      .col.after .col-label {
        color: var(--pg-amber);
      }

      .col .example {
        font-family: "JetBrains Mono", monospace;
        font-size: 20px;
        color: var(--pg-dark-fg-muted);
        background: var(--pg-dark-surface-2);
        padding: 14px 18px;
        border-radius: 10px;
        margin-bottom: 22px;
        line-height: 1.35;
      }

      .arrow {
        font-family: "JetBrains Mono", monospace;
        font-size: 32px;
        color: var(--pg-dark-fg-subtle);
        text-align: center;
        margin: 8px 0;
        line-height: 1;
      }
      .col.after .arrow {
        color: var(--pg-amber);
      }

      .result {
        font-family: var(--font-sans);
        font-weight: 700;
        font-size: 30px;
        line-height: 1.3;
        color: var(--pg-dark-fg);
        letter-spacing: -0.015em;
        margin-bottom: 12px;
      }
      .col.before .result {
        color: #e8a58a;
      }

      .cause {
        font-family: var(--font-sans);
        font-size: 22px;
        line-height: 1.4;
        color: var(--pg-dark-fg-subtle);
      }
      .cause .em {
        color: var(--pg-dark-fg-muted);
        margin-right: 6px;
      }

      /* HITL flow block — right column */
      .flow {
        background: var(--pg-dark);
        border: 1px solid rgba(232, 185, 96, 0.25);
        border-radius: 14px;
        padding: 18px 16px;
        margin-bottom: 18px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
      }
      .flow .step {
        font-family: "JetBrains Mono", monospace;
        font-size: 18px;
        color: var(--pg-amber);
        font-weight: 700;
        line-height: 1.1;
      }
      .flow .loop {
        font-family: "JetBrains Mono", monospace;
        font-size: 16px;
        color: var(--pg-dark-fg-muted);
        letter-spacing: 0.04em;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .flow .loop .glyph {
        color: var(--pg-amber);
        font-size: 22px;
        font-weight: 700;
      }
      .flow .loop b {
        color: var(--pg-green);
        font-weight: 700;
      }
      .flow .down {
        color: var(--pg-dark-fg-subtle);
        font-size: 20px;
        line-height: 1;
      }
      .flow .code {
        font-family: "JetBrains Mono", monospace;
        font-size: 20px;
        font-weight: 700;
        color: var(--pg-dark-fg);
        padding-top: 4px;
      }

      .divider {
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--pg-dark-fg-subtle);
        font-family: "Space Grotesk", sans-serif;
        font-size: 44px;
        font-weight: 400;
      }

      .bottom-note {
        position: absolute;
        left: 72px;
        right: 72px;
        bottom: 110px;
        z-index: 5;
        text-align: center;
        font-family: var(--font-sans);
        font-weight: 500;
        font-size: 24px;
        color: var(--pg-dark-fg-muted);
      }
      .bottom-note .em {
        color: var(--pg-amber);
        margin-right: 8px;
      }
    </style>
  </head>
  <body>
    <div class="slide" data-screen-label="03 Before After — HITL">
      <div class="grid-bg"></div>

      <div class="top">
        <span>WHY <span class="tag">·</span> IT MISSES</span>
        <span>COMPARE · 03</span>
      </div>

      <div class="title-block">
        <h2>
          같은 AI,<br /><span style="color: var(--pg-amber)">다른 결과</span>.
        </h2>
        <div class="sub">
          AI가 엉뚱한 걸 만드는 진짜 이유는 도구가 아니에요.
        </div>
      </div>

      <div class="split">
        <div class="col before">
          <div class="col-label">딸깍</div>
          <div class="example">"대시보드 만들어줘"</div>
          <div class="arrow">↓</div>
          <div class="result">엉뚱한 걸<br />정성스럽게</div>
          <div class="cause"><span class="em">—</span>스펙이 머릿속에만</div>
        </div>

        <div class="divider">—</div>

        <div class="col after">
          <div class="col-label">설계 먼저</div>
          <div class="flow">
            <div class="step">brainstorming</div>
            <div class="loop">
              <span class="glyph">⟷</span><b>나</b> · 승인·피드백
            </div>
            <div class="step">explore-plan-code</div>
            <div class="loop">
              <span class="glyph">⟷</span><b>나</b> · 승인·피드백
            </div>
            <div class="down">↓</div>
            <div class="code">코드</div>
          </div>
          <div class="result">어긋남을<br />코드 전에 잡음</div>
          <div class="cause"><span class="em">—</span>human-in-the-loop</div>
        </div>
      </div>

      <div class="bottom-note">
        <span class="em">—</span>매 단계 사람이 한 번 본다, 그게 전부예요
      </div>

      <div class="foot">
        <span>@codemom.life</span>
        <span>
          <span class="page"># 03 / 08</span>
          <span class="sep">·</span>
          <span class="swipe">SWIPE →</span>
        </span>
      </div>
    </div>
  </body>
</html>
