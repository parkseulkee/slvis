        font-weight: 400;
        font-size: 88px;
        color: var(--pg-dark-fg-subtle);

      }
      .cross::before,

      }
      .cross::before {

      .attrib .headline b {
        color: var(--pg-amber);
        font-weight: 700;
      }
      .attrib .meta {
