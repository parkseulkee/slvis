<!doctype html>
<html lang="ko"><head>
<meta charset="utf-8"/>
<title>Before / After 비교</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html, body { margin:0; padding:0; background:#111; display:flex; justify-content:center; align-items:center; min-height:100vh; }
  .slide {
    background: #F2ECE0;
    color: #2E2A22;
    padding: 96px 72px;
    display: flex;
    flex-direction: column;
    gap: 40px;
  }
  .top { display: flex; justify-content: space-between; font-family: var(--font-mono); font-size: 20px; letter-spacing: 0.12em; text-transform: uppercase; color: #8A7E68; }
  .top .tag { color: #C4461F; }
  h2 { font-family: var(--font-sans); font-weight: 800; font-size: 60px; line-height: 1.08; letter-spacing: -0.03em; margin: 0; }
  h2 em { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-style: normal; color: #C4461F; }

  .compare { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; flex: 1; }
  .col { background: #FAF7F2; border-radius: 24px; padding: 36px; display: flex; flex-direction: column; gap: 20px; }
  .col.after { background: #2E2A22; color: #F2ECE0; }
  .col .label { font-family: var(--font-mono); font-size: 16px; letter-spacing: 0.14em; text-transform: uppercase; color: #8A7E68; }
  .col.after .label { color: #E8B960; }
  .col h3 { font-family: var(--font-sans); font-weight: 700; font-size: 36px; margin: 0; line-height: 1.15; letter-spacing: -0.02em; }
  .bullets { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 14px; }
  .bullets li { font-family: var(--font-sans); font-size: 22px; line-height: 1.4; color: #6B6150; padding-left: 24px; position: relative; }
  .col.after .bullets li { color: #A89C82; }
  .bullets li::before { content: "—"; position: absolute; left: 0; color: #C4461F; }
  .col.after .bullets li::before { color: #E8B960; }
  .arrow { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); font-family: var(--font-mono); font-size: 28px; background: #C4461F; color: #fff; width: 64px; height: 64px; border-radius: 50%; display:flex; align-items:center; justify-content:center; }
  .compare-wrap { position: relative; flex: 1; }
  .footer { display: flex; justify-content: space-between; font-family: var(--font-mono); font-size: 18px; color: #8A7E68; letter-spacing: 0.08em; }
</style></head>
<body>
<div class="slide" data-screen-label="04 Before After">
  <div class="top">
    <span>DEV · <span class="tag">D2</span></span>
    <span>3 / 7</span>
  </div>
  <h2>대기업 개발 <em>vs</em><br/>1인 개발</h2>
  <div class="compare-wrap">
    <div class="compare">
      <div class="col">
        <span class="label">— 대기업에서는</span>
        <h3>잘 쪼개진<br/>작은 문제들</h3>
        <ul class="bullets">
          <li>동료 리뷰가 안전망</li>
          <li>인프라는 남이 관리</li>
          <li>정해진 스택</li>
        </ul>
      </div>
      <div class="col after">
        <span class="label">+ 1인 개발은</span>
        <h3>다 내 문제,<br/>다 내 결정</h3>
        <ul class="bullets">
          <li>리뷰어도 나</li>
          <li>배포도 모니터링도 나</li>
          <li>스택 고르는 것부터 시작</li>
        </ul>
      </div>
    </div>
    <div class="arrow">→</div>
  </div>
  <div class="footer"><span>@codemom.life</span><span>SWIPE →</span></div>
</div>
</body></html>
