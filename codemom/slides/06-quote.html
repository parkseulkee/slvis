<!doctype html>
<html lang="ko"><head>
<meta charset="utf-8"/>
<title>인용 · 명언형</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html, body { margin:0; padding:0; background:#111; display:flex; justify-content:center; align-items:center; min-height:100vh; }
  .slide { background:#FAF7F2; color:#2E2A22; padding:96px 72px; display:flex; flex-direction:column; justify-content:space-between; position:relative; }
  .top { display:flex; justify-content:space-between; font-family:var(--font-mono); font-size:20px; letter-spacing:0.12em; text-transform:uppercase; color:#8A7E68; }
  .top .tag { color:#C4461F; }
  .qmark { font-family:'Space Grotesk', sans-serif; font-weight:700; font-size:220px; line-height:0.8; color:#C4461F; }
  blockquote { font-family:'Space Grotesk', sans-serif; font-weight:700; font-size:84px; line-height:1.08; letter-spacing:-0.035em; margin:0; color:#2E2A22; }
  blockquote .hl { background:#F4E4C1; padding:0 10px; }
  .attrib { font-family:var(--font-mono); font-size:18px; letter-spacing:0.12em; text-transform:uppercase; color:#8A7E68; display:flex; align-items:center; gap:14px; }
  .attrib .line { width:48px; height:1px; background:#C4461F; }
  .footer { display:flex; justify-content:space-between; font-family:var(--font-mono); font-size:18px; color:#8A7E68; letter-spacing:0.08em; }
</style></head>
<body>
<div class="slide" data-screen-label="06 Quote">
  <div class="top"><span>DEV · <span class="tag">D5</span></span><span>4 / 6</span></div>
  <div style="display:flex; flex-direction:column; gap:40px;">
    <div class="qmark">“</div>
    <blockquote>좋은 코드는<br/>아이처럼 <span class="hl">자주</span><br/>봐줘야 해요.</blockquote>
    <div class="attrib"><span class="line"></span>육아하며 배운 개발 원칙 No.3</div>
  </div>
  <div class="footer"><span>@codemom.life</span><span>SWIPE →</span></div>
</div>
</body></html>
