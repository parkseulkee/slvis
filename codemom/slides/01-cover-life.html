<!doctype html>
<html lang="ko"><head>
<meta charset="utf-8"/>
<title>표지/훅 — LIFE</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html, body { margin:0; padding:0; background:#111; display:flex; justify-content:center; align-items:center; min-height:100vh; }
  .slide { position:relative; color:#FAF7F2; overflow:hidden; isolation:isolate; }

  /* Photo placeholder — full bleed, desaturated crosshatch */
  .photo { position:absolute; inset:0; background:
      repeating-linear-gradient(-45deg, #8A7E68 0 10px, #6B6150 10px 20px);
    z-index:0; }
  .photo::after {
    content:"[ 사진 · 4:5 · 따뜻한 실내 ]";
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    font-family:var(--font-mono); font-size:14px; letter-spacing:0.16em; text-transform:uppercase;
    color:rgba(250,247,242,0.35); mix-blend-mode:screen;
  }
  /* Warm tint + bottom→top darken so text is readable */
  .tint { position:absolute; inset:0; background:
      linear-gradient(180deg, rgba(196,70,31,0.35) 0%, rgba(46,42,34,0.15) 35%, rgba(14,13,10,0.85) 100%);
    z-index:1; }
  /* Subtle grain */
  .grain { position:absolute; inset:0; z-index:2; opacity:0.12; mix-blend-mode:overlay;
    background-image: radial-gradient(rgba(255,255,255,0.6) 1px, transparent 1px);
    background-size: 3px 3px; }

  .content { position:relative; z-index:3; padding:56px 72px 72px; display:flex; flex-direction:column; height:100%; box-sizing:border-box; }
  .top { display:flex; justify-content:space-between; align-items:center; font-family:var(--font-mono); font-size:20px; letter-spacing:0.12em; text-transform:uppercase; color:rgba(250,247,242,0.75); }
  .top .acc { color:#F4E4C1; }

  .hook { font-family:var(--font-mono); font-size:22px; color:rgba(250,247,242,0.85); letter-spacing:0.06em; margin-bottom:24px; display:inline-flex; align-items:center; gap:12px; }
  .hook .line { width:36px; height:1px; background:#F4E4C1; }

  h1 { font-family:var(--font-sans); font-weight:800; font-size:104px; line-height:1.0; letter-spacing:-0.045em; margin:0; color:#FAF7F2; text-wrap:pretty; }
  h1 .accent { color:#F4E4C1; }
  h1 em { font-family:'Space Grotesk', sans-serif; font-weight:700; font-style:normal; }

  .bottom { margin-top:auto; display:flex; flex-direction:column; gap:28px; }
  .copy-wrap { max-width:780px; }
  .footer { display:flex; justify-content:space-between; align-items:flex-end; font-family:var(--font-mono); font-size:18px; color:rgba(250,247,242,0.7); letter-spacing:0.08em; }
  .swipe { display:flex; align-items:center; gap:10px; color:#F4E4C1; font-weight:500; }
</style></head>
<body>
<div class="slide" data-screen-label="01 Cover LIFE">
  <div class="photo"></div>
  <div class="tint"></div>
  <div class="grain"></div>
  <div class="content">
    <div class="top">
      <span>LIFE · <span class="acc">L1</span></span>
      <span>@codemom.life</span>
    </div>
    <div class="bottom">
      <div class="copy-wrap">
        <div class="hook"><span class="line"></span>아기가 잠든 새벽 2시</div>
        <h1>진짜 <em>하루</em>가<br/>이제야 <span class="accent">시작돼요.</span></h1>
      </div>
      <div class="footer">
        <span>2026.04 · D+127</span>
        <span class="swipe">SWIPE →</span>
      </div>
    </div>
  </div>
</div>
</body></html>
