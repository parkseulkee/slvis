<!doctype html>
<html lang="ko"><head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html, body { margin:0; padding:0; background:#FAF7F2; }
  .card { width: 700px; padding: 28px; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; }
  .demo { height: 120px; background: #FFFFFF; border-radius: 14px; display:flex; align-items:flex-end; padding: 14px; font-family: var(--font-mono); font-size: 11px; color: #8A7E68; }
  .title { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: #8A7E68; margin-bottom: 18px; }
  .card1 { box-shadow: 0 1px 2px rgba(46,42,34,0.06), 0 8px 24px rgba(46,42,34,0.08); }
  .card2 { box-shadow: 0 4px 12px rgba(46,42,34,0.10), 0 24px 64px rgba(46,42,34,0.14); }
  .card3 { background: #17150F; color: #E8B960; box-shadow: 0 0 0 1px rgba(232,185,96,0.15), 0 12px 40px rgba(0,0,0,0.5); }
</style></head>
<body>
<div class="card">
  <div class="title">ELEVATION</div>
  <div class="grid">
    <div class="demo card1">sh-card</div>
    <div class="demo card2">sh-lift</div>
    <div class="demo card3">sh-tech</div>
  </div>
</div>
</body></html>
