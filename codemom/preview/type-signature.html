<!doctype html>
<html lang="ko"><head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html, body { margin:0; padding:0; background:#FAF7F2; }
  .wrap { width: 700px; padding: 32px; }
  .stack { display:flex; flex-direction:column; gap: 14px; }
  .ex {
    padding: 22px 26px;
    border-radius: 12px;
    background: #F2ECE0;
    color: #2E2A22;
    font-family: var(--font-sans);
  }
  .quote {
    font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-style: normal;
    font-size: 26px;
    line-height: 1.25;
    letter-spacing: -0.01em;
  }
  .meta { font-family: var(--font-mono); font-size: 11px; color:#8A7E68; letter-spacing: 0.1em; text-transform: uppercase; margin-top: 10px; }
  .mixed .mono { font-family: var(--font-mono); background:#2E2A22; color:#E8B960; padding: 2px 8px; border-radius: 4px; font-size: 0.85em; }
  .mixed { font-size: 22px; font-weight: 600; line-height: 1.3; letter-spacing: -0.02em; }
</style></head>
<body>
<div class="wrap">
  <div class="stack">
    <div class="ex">
      <div class="quote">"퇴근이 없는 대신,<br/>출근도 없는 삶"</div>
      <div class="meta">Space Grotesk · 인용 슬라이드</div>
    </div>
    <div class="ex mixed">
      오늘 배운 것 : <span class="mono">useEffect</span>와<br/>수유 간격의 공통점
      <div class="meta" style="margin-top:12px;">Pretendard + JetBrains 혼용</div>
    </div>
  </div>
</div>
</body></html>
