<!doctype html>
<html lang="ko"><head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html, body { margin:0; padding:0; background:#FAF7F2; }
  .card { width: 700px; padding: 28px; font-family: var(--font-sans); }
  .row { display:flex; align-items:center; gap: 18px; padding: 8px 0; }
  .label { width: 70px; font-family: var(--font-mono); font-size: 11px; color:#8A7E68; letter-spacing: 0.08em; }
  .bar { height: 14px; background: #C4461F; border-radius: 3px; }
  .val { font-family: var(--font-mono); font-size: 11px; color:#2E2A22; margin-left: auto; }
  .title { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: #8A7E68; margin-bottom: 14px; }
</style></head>
<body>
<div class="card">
  <div class="title">SPACING · 8PX BASE</div>
  <div class="row"><div class="label">s-1</div><div class="bar" style="width:8px"></div><div class="val">8px</div></div>
  <div class="row"><div class="label">s-2</div><div class="bar" style="width:16px"></div><div class="val">16px</div></div>
  <div class="row"><div class="label">s-3</div><div class="bar" style="width:24px"></div><div class="val">24px · 기본 gap</div></div>
  <div class="row"><div class="label">s-4</div><div class="bar" style="width:32px"></div><div class="val">32px</div></div>
  <div class="row"><div class="label">s-5</div><div class="bar" style="width:48px"></div><div class="val">48px · 섹션 내부</div></div>
  <div class="row"><div class="label">s-6</div><div class="bar" style="width:64px"></div><div class="val">64px · 섹션 간</div></div>
  <div class="row"><div class="label">s-7</div><div class="bar" style="width:96px"></div><div class="val">96px · 슬라이드 상하</div></div>
  <div class="row"><div class="label">s-8</div><div class="bar" style="width:128px"></div><div class="val">128px</div></div>
</div>
</body></html>
