<!doctype html>
<html lang="ko"><head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html, body { margin:0; padding:0; background:#FAF7F2; }
  .card { width: 700px; padding: 28px; display:flex; flex-direction:column; gap: 16px; }
  .row { display:flex; gap: 12px; flex-wrap:wrap; align-items:center; }
  .btn { font-family: var(--font-sans); font-weight: 600; padding: 12px 22px; border-radius: 999px; font-size: 14px; border: none; cursor: pointer; letter-spacing: -0.01em; display: inline-flex; align-items:center; gap: 8px; }
  .btn-primary { background: #2E2A22; color: #F2ECE0; }
  .btn-accent { background: #C4461F; color: #fff; }
  .btn-outline { background: transparent; color: #2E2A22; box-shadow: inset 0 0 0 1.5px #2E2A22; }
  .btn-ghost { background: transparent; color: #2E2A22; padding: 12px 10px; }
  .btn-tech { background: #E8B960; color: #0E0D0A; font-family: var(--font-mono); font-weight: 500; letter-spacing: 0.04em; }
  .label-row { display:flex; gap: 18px; flex-wrap:wrap; font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; }
  .label-row span { color: #8A7E68; }
  .label-row .accent { color: #C4461F; }
  .arrow { font-size: 16px; }
</style></head>
<body>
<div class="card">
  <div class="row">
    <button class="btn btn-primary">저장하기<span class="arrow">→</span></button>
    <button class="btn btn-accent">팔로우 하기</button>
    <button class="btn btn-outline">다음</button>
    <button class="btn btn-ghost">더보기 →</button>
    <button class="btn btn-tech">$ try it</button>
  </div>
  <div class="label-row">
    <span>· DEVELOPER MOM</span>
    <span class="accent">· D+127</span>
    <span>· 2026.04</span>
    <span class="accent">· SWIPE →</span>
  </div>
</div>
</body></html>
