<!doctype html>
<html lang="ko"><head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html, body { margin:0; padding:0; background:#FAF7F2; }
  .card { width: 700px; padding: 32px; color:#2E2A22; }
  .row { display:flex; align-items: baseline; gap: 24px; padding: 14px 0; border-bottom: 1px dashed #D9CFB8; }
  .row:last-child { border-bottom: none; }
  .label { width: 90px; flex-shrink: 0; font-family: var(--font-mono); font-size: 12px; color: #8A7E68; letter-spacing: 0.1em; text-transform: uppercase; }
  .meta { margin-left: auto; font-family: var(--font-mono); font-size: 12px; color: #8A7E68; white-space: nowrap; }
  .sample { flex: 1; color: #2E2A22; line-height: 1.02; }
  .acc { color: #C4461F; }
</style></head>
<body>
<div class="card">
  <div class="row">
    <div class="label">Hero</div>
    <div class="sample" style="font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 56px; letter-spacing: -0.04em;">새벽 <span class="acc">2시의</span> 코드</div>
    <div class="meta">Space Grotesk 700 · 112px</div>
  </div>
  <div class="row">
    <div class="label">Display</div>
    <div class="sample" style="font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 44px; letter-spacing: -0.04em;">9년차 개발자가</div>
    <div class="meta">Space Grotesk 700 · 84px</div>
  </div>
  <div class="row">
    <div class="label">H1</div>
    <div class="sample" style="font-family:var(--font-sans); font-weight:700; font-size:34px; letter-spacing:-0.03em;">육아휴직 중에 하는 일</div>
    <div class="meta">Pretendard 700 · 64px</div>
  </div>
  <div class="row">
    <div class="label">H2</div>
    <div class="sample" style="font-family:var(--font-sans); font-weight:700; font-size:28px; letter-spacing:-0.02em;">예상 vs 현실</div>
    <div class="meta">Pretendard 700 · 52px</div>
  </div>
  <div class="row">
    <div class="label">H3</div>
    <div class="sample" style="font-family:var(--font-sans); font-weight:600; font-size:22px;">오늘 쓴 AI 도구 5가지</div>
    <div class="meta">Pretendard 600 · 40px</div>
  </div>
</div>
</body></html>
