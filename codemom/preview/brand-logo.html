<!doctype html>
<html lang="ko"><head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html, body { margin:0; padding:0; background:#FAF7F2; }
  .card { width: 700px; padding: 28px; display: grid; grid-template-columns: 1fr 1fr; gap: 16px; align-items: center; }
  .slot { display: flex; align-items: center; justify-content: center; border-radius: 14px; padding: 24px; min-height: 160px; }
  .light { background: #F2ECE0; }
  .dark { background: #0E0D0A; }
  .slot img { max-width: 100%; height: auto; }
</style></head>
<body>
<div class="card">
  <div class="slot light"><img src="../assets/logo-wordmark.svg" alt="wordmark" style="width:80%"/></div>
  <div class="slot dark">
    <svg viewBox="0 0 400 120" xmlns="http://www.w3.org/2000/svg" style="width:80%">
      <text x="20" y="78" font-family="'JetBrains Mono', ui-monospace, monospace" font-weight="700" font-size="56" fill="#F2ECE0" letter-spacing="-0.02em">@codemom</text>
      <text x="20" y="108" font-family="'JetBrains Mono', ui-monospace, monospace" font-weight="500" font-size="22" fill="#E8B960" letter-spacing="0.06em">.LIFE</text>
      <rect x="348" y="35" width="18" height="48" fill="#E8B960"/>
    </svg>
  </div>
  <div class="slot light"><img src="../assets/logo-mark-life.svg" alt="mark-life" style="width:120px"/></div>
  <div class="slot dark"><img src="../assets/logo-mark.svg" alt="mark" style="width:120px"/></div>
</div>
</body></html>
