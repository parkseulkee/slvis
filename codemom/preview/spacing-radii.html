<!doctype html>
<html lang="ko"><head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html, body { margin:0; padding:0; background:#FAF7F2; }
  .card { width: 700px; padding: 28px; }
  .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 14px; }
  .sw { display:flex; flex-direction:column; align-items:center; gap: 8px; }
  .box { width: 74px; height: 56px; background: #2E2A22; }
  .name { font-family: var(--font-mono); font-size: 11px; color:#2E2A22; }
  .val { font-family: var(--font-mono); font-size: 10px; color:#8A7E68; }
  .title { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: #8A7E68; margin-bottom: 18px; }
</style></head>
<body>
<div class="card">
  <div class="title">CORNER RADII</div>
  <div class="grid">
    <div class="sw"><div class="box" style="border-radius:4px"></div><div class="name">r-xs</div><div class="val">4</div></div>
    <div class="sw"><div class="box" style="border-radius:8px"></div><div class="name">r-sm</div><div class="val">8</div></div>
    <div class="sw"><div class="box" style="border-radius:16px"></div><div class="name">r-md</div><div class="val">16</div></div>
    <div class="sw"><div class="box" style="border-radius:24px"></div><div class="name">r-lg</div><div class="val">24</div></div>
    <div class="sw"><div class="box" style="border-radius:36px"></div><div class="name">r-xl</div><div class="val">36</div></div>
    <div class="sw"><div class="box" style="border-radius:999px"></div><div class="name">pill</div><div class="val">∞</div></div>
  </div>
</div>
</body></html>
