<!doctype html>
<html lang="ko"><head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html, body { margin:0; padding:0; background:#FAF7F2; }
  .card { width: 700px; padding: 28px; display: grid; grid-template-columns: repeat(6, 1fr); gap: 18px; align-items: center; }
  .icon { display: flex; align-items:center; justify-content: center; height: 60px; color: #2E2A22; }
  .icon svg { width: 32px; height: 32px; stroke: currentColor; stroke-width: 1.75; fill: none; stroke-linecap: round; stroke-linejoin: round; }
  .name { font-family: var(--font-mono); font-size: 10px; color: #8A7E68; text-align: center; margin-top: -8px; }
  .cap { grid-column: 1 / -1; font-family: var(--font-mono); font-size: 10px; color:#8A7E68; letter-spacing: 0.12em; text-transform: uppercase; margin-top: 6px; }
</style></head>
<body>
<div class="card">
  <div>
    <div class="icon"><svg viewBox="0 0 24 24"><path d="M16 18l6-6-6-6M8 6l-6 6 6 6"/></svg></div>
    <div class="name">code</div>
  </div>
  <div>
    <div class="icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div>
    <div class="name">clock</div>
  </div>
  <div>
    <div class="icon"><svg viewBox="0 0 24 24"><path d="M12 3l2.5 6L21 10l-5 4.5L17.5 21 12 17.5 6.5 21 8 14.5 3 10l6.5-1z"/></svg></div>
    <div class="name">star</div>
  </div>
  <div>
    <div class="icon"><svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg></div>
    <div class="name">heart</div>
  </div>
  <div>
    <div class="icon"><svg viewBox="0 0 24 24"><polyline points="5 12 12 19 23 4"/></svg></div>
    <div class="name">check</div>
  </div>
  <div>
    <div class="icon"><svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></div>
    <div class="name">arrow</div>
  </div>
  <div>
    <div class="icon"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></div>
    <div class="name">chat</div>
  </div>
  <div>
    <div class="icon"><svg viewBox="0 0 24 24"><path d="M12 20.5c-5.5-4-8-7-8-11a4 4 0 0 1 8-1 4 4 0 0 1 8 1c0 4-2.5 7-8 11z"/></svg></div>
    <div class="name">like</div>
  </div>
  <div>
    <div class="icon"><svg viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg></div>
    <div class="name">bookmark</div>
  </div>
  <div>
    <div class="icon"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></div>
    <div class="name">calendar</div>
  </div>
  <div>
    <div class="icon"><svg viewBox="0 0 24 24"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg></div>
    <div class="name">zap</div>
  </div>
  <div>
    <div class="icon"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div>
    <div class="name">file</div>
  </div>
  <div class="cap">LUCIDE · 1.75 STROKE · ROUND CAP</div>
</div>
</body></html>
