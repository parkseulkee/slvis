<!doctype html>
<html lang="ko"><head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html, body { margin:0; padding:0; background:#0E0D0A; }
  .card { width: 700px; padding: 28px; color: #F2ECE0; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .sw { display: flex; flex-direction: column; gap: 6px; }
  .chip { aspect-ratio: 1.3/1; border-radius: 10px; box-shadow: inset 0 0 0 1px rgba(255,255,255,0.06); }
  .name { font-family: var(--font-mono); font-size: 11px; color:#F2ECE0; letter-spacing: 0.04em; }
  .hex { font-family: var(--font-mono); font-size: 10px; color:#A89C82; }
  .title { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: #A89C82; margin-bottom: 14px; }
</style></head>
<body>
<div class="card">
  <div class="title">TECH · DARK PALETTE</div>
  <div class="grid">
    <div class="sw"><div class="chip" style="background:#0E0D0A"></div><div class="name">bg</div><div class="hex">#0E0D0A</div></div>
    <div class="sw"><div class="chip" style="background:#17150F"></div><div class="name">surface</div><div class="hex">#17150F</div></div>
    <div class="sw"><div class="chip" style="background:#22201A"></div><div class="name">surface-2</div><div class="hex">#22201A</div></div>
    <div class="sw"><div class="chip" style="background:#2E2A22"></div><div class="name">line</div><div class="hex">#2E2A22</div></div>
    <div class="sw"><div class="chip" style="background:#A89C82"></div><div class="name">fg-muted</div><div class="hex">#A89C82</div></div>
    <div class="sw"><div class="chip" style="background:#F2ECE0"></div><div class="name">fg</div><div class="hex">#F2ECE0</div></div>
    <div class="sw"><div class="chip" style="background:#E8B960"></div><div class="name">accent</div><div class="hex">#E8B960</div></div>
    <div class="sw"><div class="chip" style="background:#7FB069"></div><div class="name">accent-2</div><div class="hex">#7FB069</div></div>
  </div>
</div>
</body></html>
