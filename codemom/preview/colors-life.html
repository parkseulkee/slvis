<!doctype html>
<html lang="ko"><head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html, body { margin:0; padding:0; background:#FAF7F2; }
  .card { width: 700px; padding: 28px; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .sw { display: flex; flex-direction: column; gap: 6px; }
  .chip { aspect-ratio: 1.3/1; border-radius: 10px; box-shadow: inset 0 0 0 1px rgba(0,0,0,0.06); }
  .name { font-family: var(--font-mono); font-size: 11px; color:#2E2A22; letter-spacing: 0.04em; }
  .hex { font-family: var(--font-mono); font-size: 10px; color:#8A7E68; }
  .title { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: #8A7E68; margin-bottom: 14px; }
</style></head>
<body>
<div class="card">
  <div class="title">LIFE · WARM PALETTE</div>
  <div class="grid">
    <div class="sw"><div class="chip" style="background:#FAF7F2"></div><div class="name">bg</div><div class="hex">#FAF7F2</div></div>
    <div class="sw"><div class="chip" style="background:#F2ECE0"></div><div class="name">surface</div><div class="hex">#F2ECE0</div></div>
    <div class="sw"><div class="chip" style="background:#E8DFCA"></div><div class="name">surface-2</div><div class="hex">#E8DFCA</div></div>
    <div class="sw"><div class="chip" style="background:#D9CFB8"></div><div class="name">line</div><div class="hex">#D9CFB8</div></div>
    <div class="sw"><div class="chip" style="background:#8A7E68"></div><div class="name">fg-subtle</div><div class="hex">#8A7E68</div></div>
    <div class="sw"><div class="chip" style="background:#6B6150"></div><div class="name">fg-muted</div><div class="hex">#6B6150</div></div>
    <div class="sw"><div class="chip" style="background:#2E2A22"></div><div class="name">fg</div><div class="hex">#2E2A22</div></div>
    <div class="sw"><div class="chip" style="background:#C4461F"></div><div class="name">accent</div><div class="hex">#C4461F</div></div>
  </div>
</div>
</body></html>
