<!doctype html>
<html lang="ko"><head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html, body { margin:0; padding:0; background:#FAF7F2; }
  .card { width: 700px; padding: 28px; display:flex; flex-wrap:wrap; gap: 10px; align-items:center; }
  .badge { display: inline-flex; align-items: center; gap: 6px; padding: 5px 12px; border-radius: 999px; font-family: var(--font-mono); font-size: 11px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; }
  .b-life { background: #F2ECE0; color: #C4461F; box-shadow: inset 0 0 0 1px #D9CFB8; }
  .b-tech { background: #22201A; color: #E8B960; box-shadow: inset 0 0 0 1px rgba(232,185,96,0.3); }
  .b-solid { background: #2E2A22; color: #F2ECE0; }
  .b-accent { background: #C4461F; color: #fff; }
  .b-ok { background: #6B8A3E; color: #fff; }
  .b-highlight { background: #F4E4C1; color: #6B6150; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
</style></head>
<body>
<div class="card">
  <span class="badge b-life"><span class="dot"></span>LIFE · 03</span>
  <span class="badge b-tech"><span class="dot"></span>AI TOOL</span>
  <span class="badge b-solid">DEV · 01</span>
  <span class="badge b-accent">NEW</span>
  <span class="badge b-ok">완료</span>
  <span class="badge b-highlight">#코드맘</span>
  <span class="badge b-life">D+127</span>
  <span class="badge b-tech">v2.1</span>
  <span class="badge b-solid">04 / 08</span>
</div>
</body></html>
