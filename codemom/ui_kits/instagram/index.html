<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<title>UI Kit · Instagram Feed Preview</title>
<link rel="stylesheet" href="../../colors_and_type.css"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  html, body { margin:0; padding:0; background:#FAFAFA; font-family: var(--font-sans); }
  .page { min-height: 100vh; display: flex; justify-content: center; padding: 40px 20px; }
  .phone-frame { width: 468px; background: #fff; border-radius: 20px; overflow: hidden; box-shadow: 0 8px 32px rgba(0,0,0,0.08); height: fit-content; }

  .ig-post { background: #fff; }
  .ig-header { display: flex; align-items: center; gap: 12px; padding: 12px 16px; }
  .ig-avatar { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, #C4461F, #E8B960); position: relative; }
  .ig-avatar::after { content: ""; position: absolute; inset: 2px; border-radius: 50%; background: #F2ECE0 url('../../assets/logo-mark-life.svg') center/80% no-repeat; }
  .ig-handle { flex: 1; }
  .ig-handle .name { font-weight: 600; font-size: 14px; color: #262626; }
  .ig-handle .meta { font-size: 12px; color: #737373; }
  .ig-more { background: none; border: none; font-size: 20px; color: #262626; cursor: pointer; }

  .ig-carousel { position: relative; aspect-ratio: 4/5; overflow: hidden; background: #000; }
  .carousel-track { display: flex; height: 100%; transition: transform 0.35s cubic-bezier(0.22, 0.61, 0.36, 1); }
  .carousel-slide { flex: 0 0 100%; height: 100%; position: relative; overflow: hidden; }
  .carousel-slide iframe { width: 1080px; height: 1350px; border: none; transform: scale(0.433); transform-origin: top left; position: absolute; top: 0; left: 0; pointer-events: none; }
  .carousel-counter { position: absolute; top: 12px; right: 12px; background: rgba(0,0,0,0.7); color: #fff; font-family: var(--font-mono); font-size: 12px; padding: 4px 10px; border-radius: 12px; z-index: 2; }
  .car-nav { position: absolute; top: 50%; transform: translateY(-50%); width: 32px; height: 32px; border-radius: 50%; background: rgba(255,255,255,0.9); border: none; font-size: 18px; cursor: pointer; color: #262626; display: flex; align-items: center; justify-content: center; z-index: 2; }
  .car-nav.left { left: 12px; }
  .car-nav.right { right: 12px; }

  .ig-dots { display: flex; justify-content: center; gap: 4px; padding: 8px 0; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: #E5E5E5; }
  .dot.active { background: #0095F6; }

  .ig-actions { display: flex; justify-content: space-between; padding: 4px 12px 8px; }
  .left-actions { display: flex; gap: 4px; }
  .ig-actions button { background: none; border: none; padding: 8px; cursor: pointer; color: #262626; line-height: 0; }
  .ig-actions button.liked { color: #ED4956; }

  .ig-likes { padding: 0 16px 4px; font-size: 14px; color: #262626; }
  .ig-likes b { font-weight: 600; }
  .ig-caption { padding: 0 16px 4px; font-size: 14px; color: #262626; line-height: 1.4; }
  .ig-caption b { font-weight: 600; margin-right: 4px; }
  .ig-caption .more { color: #737373; cursor: pointer; }
  .ig-comments { padding: 4px 16px; font-size: 14px; color: #737373; cursor: pointer; }
  .ig-time { padding: 4px 16px 16px; font-size: 11px; color: #737373; text-transform: uppercase; letter-spacing: 0.04em; }
</style>
</head>
<body>
<div class="page">
  <div class="phone-frame" id="root"></div>
</div>

<script type="text/babel">
  const { useState } = React;
  const { createRoot } = ReactDOM;

  const slides = [
    { src: '../../slides/01-cover-life.html', label: '표지' },
    { src: '../../slides/06-quote.html', label: '인용' },
    { src: '../../slides/05-timeline.html', label: '타임라인' },
    { src: '../../slides/09-cta.html', label: 'CTA' },
  ];

  const HeartIcon = () => (
    <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
  );
  const HeartFill = () => (
    <svg viewBox="0 0 24 24" width="26" height="26" fill="currentColor"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
  );
  const ChatIcon = () => (
    <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
  );
  const ShareIcon = () => (
    <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
  );
  const BookmarkIcon = () => (
    <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
  );
  const BookmarkFill = () => (
    <svg viewBox="0 0 24 24" width="26" height="26" fill="currentColor"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
  );

  function InstagramFeed() {
    const [liked, setLiked] = useState(false);
    const [saved, setSaved] = useState(false);
    const [slideIdx, setSlideIdx] = useState(0);

    return (
      <div className="ig-post">
        <header className="ig-header">
          <div className="ig-avatar" />
          <div className="ig-handle">
            <div className="name">codemom.life</div>
            <div className="meta">개발자 · 엄마 · 서울</div>
          </div>
          <button className="ig-more">···</button>
        </header>

        <div className="ig-carousel">
          <div className="carousel-track" style={{transform: `translateX(-${slideIdx * 100}%)`}}>
            {slides.map((s, i) => (
              <div className="carousel-slide" key={i}>
                <iframe src={s.src} title={s.label} />
              </div>
            ))}
          </div>
          <div className="carousel-counter">{slideIdx + 1}/{slides.length}</div>
          {slideIdx > 0 && <button className="car-nav left" onClick={() => setSlideIdx(slideIdx - 1)}>‹</button>}
          {slideIdx < slides.length - 1 && <button className="car-nav right" onClick={() => setSlideIdx(slideIdx + 1)}>›</button>}
        </div>

        <div className="ig-dots">
          {slides.map((_, i) => (
            <span key={i} className={`dot ${i === slideIdx ? 'active' : ''}`} />
          ))}
        </div>

        <div className="ig-actions">
          <div className="left-actions">
            <button onClick={() => setLiked(!liked)} className={liked ? 'liked' : ''}>
              {liked ? <HeartFill /> : <HeartIcon />}
            </button>
            <button><ChatIcon /></button>
            <button><ShareIcon /></button>
          </div>
          <button onClick={() => setSaved(!saved)}>
            {saved ? <BookmarkFill /> : <BookmarkIcon />}
          </button>
        </div>

        <div className="ig-likes">좋아요 <b>1,247</b>개</div>
        <div className="ig-caption">
          <b>codemom.life</b> 새벽 2시의 코딩 루틴, 솔직한 버전 ✍️
          <span className="more"> 더 보기</span>
        </div>
        <div className="ig-comments">댓글 <b>38</b>개 모두 보기</div>
        <div className="ig-time">3시간 전</div>
      </div>
    );
  }

  createRoot(document.getElementById('root')).render(<InstagramFeed />);
</script>
</body>
</html>
