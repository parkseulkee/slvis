<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#61dafb" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#61dafb" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bodyGrad" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#e8f4fe"/>
      <stop offset="100%" stop-color="#bae0fd"/>
    </radialGradient>
    <radialGradient id="cheek" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f9a8d4" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#f9a8d4" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- 배경 글로우 -->
  <circle cx="100" cy="105" r="95" fill="url(#glow)">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite"/>
  </circle>

  <!-- 외곽 링 (자비스 느낌 유지, 얇고 부드럽게) -->
  <g>
    <circle cx="100" cy="105" r="90" fill="none" stroke="#61dafb" stroke-width="1" opacity="0.3" stroke-dasharray="8 12"/>
    <animateTransform attributeName="transform" type="rotate" from="0 100 105" to="360 100 105" dur="20s" repeatCount="indefinite"/>
  </g>
  <g>
    <circle cx="100" cy="105" r="85" fill="none" stroke="#818cf8" stroke-width="1" opacity="0.2" stroke-dasharray="5 15"/>
    <animateTransform attributeName="transform" type="rotate" from="0 100 105" to="-360 100 105" dur="15s" repeatCount="indefinite"/>
  </g>

  <!-- 몸통 (둥글둥글) -->
  <ellipse cx="100" cy="115" rx="45" ry="42" fill="url(#bodyGrad)" stroke="#93c5fd" stroke-width="1.5"/>

  <!-- 머리 (큰 원) -->
  <circle cx="100" cy="75" r="40" fill="url(#bodyGrad)" stroke="#93c5fd" stroke-width="1.5"/>

  <!-- 안테나 -->
  <line x1="100" y1="35" x2="100" y2="20" stroke="#93c5fd" stroke-width="2" stroke-linecap="round"/>
  <circle cx="100" cy="16" r="5" fill="#61dafb" opacity="0.8">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="r" values="4;6;4" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- 눈 -->
  <circle cx="85" cy="72" r="6" fill="#1e3a5f"/>
  <circle cx="115" cy="72" r="6" fill="#1e3a5f"/>
  <!-- 눈 하이라이트 -->
  <circle cx="87" cy="70" r="2.5" fill="white" opacity="0.9"/>
  <circle cx="117" cy="70" r="2.5" fill="white" opacity="0.9"/>

  <!-- 볼 터치 -->
  <circle cx="72" cy="82" r="8" fill="url(#cheek)"/>
  <circle cx="128" cy="82" r="8" fill="url(#cheek)"/>

  <!-- 입 (미소) -->
  <path d="M 92 87 Q 100 94 108 87" fill="none" stroke="#1e3a5f" stroke-width="1.8" stroke-linecap="round"/>

  <!-- 배 부분 화면 (자비스 코어) -->
  <ellipse cx="100" cy="118" rx="20" ry="18" fill="#0f172a" opacity="0.15"/>
  <ellipse cx="100" cy="118" rx="18" ry="16" fill="none" stroke="#61dafb" stroke-width="1" opacity="0.5">
    <animate attributeName="opacity" values="0.3;0.7;0.3" dur="2.5s" repeatCount="indefinite"/>
  </ellipse>

  <!-- 배 화면 텍스트 -->
  <text x="100" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#61dafb" letter-spacing="2" opacity="0.8">SLVIS
    <animate attributeName="opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite"/>
  </text>

  <!-- 팔 (짧고 둥글게) -->
  <ellipse cx="55" cy="112" rx="12" ry="8" fill="url(#bodyGrad)" stroke="#93c5fd" stroke-width="1.5" transform="rotate(-20 55 112)"/>
  <ellipse cx="145" cy="112" rx="12" ry="8" fill="url(#bodyGrad)" stroke="#93c5fd" stroke-width="1.5" transform="rotate(20 145 112)"/>

  <!-- 발 -->
  <ellipse cx="82" cy="155" rx="14" ry="8" fill="url(#bodyGrad)" stroke="#93c5fd" stroke-width="1.5"/>
  <ellipse cx="118" cy="155" rx="14" ry="8" fill="url(#bodyGrad)" stroke="#93c5fd" stroke-width="1.5"/>

  <!-- 전체 살짝 흔들리기 (숨쉬는 느낌) -->
  <animateTransform attributeName="transform" type="translate" values="0,0;0,-2;0,0" dur="3s" repeatCount="indefinite"/>
</svg>
